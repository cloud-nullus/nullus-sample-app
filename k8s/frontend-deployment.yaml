apiVersion: apps/v1
kind: Deployment
metadata:
  name: nullus-sample-frontend
  namespace: nullus-sample
  labels:
    app: nullus-sample-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nullus-sample-frontend
  template:
    metadata:
      labels:
        app: nullus-sample-frontend
    spec:
      containers:
        - name: frontend
          image: nullus-sample-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
