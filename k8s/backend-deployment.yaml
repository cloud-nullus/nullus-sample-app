apiVersion: apps/v1
kind: Deployment
metadata:
  name: nullus-sample-backend
  namespace: nullus-sample
  labels:
    app: nullus-sample-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nullus-sample-backend
  template:
    metadata:
      labels:
        app: nullus-sample-backend
    spec:
      containers:
        - name: backend
          image: nullus-sample-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            periodSeconds: 10
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            periodSeconds: 5
            initialDelaySeconds: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
